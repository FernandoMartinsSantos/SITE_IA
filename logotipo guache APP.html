<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logotipo DevApps - Estilo Guache</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Estilo Guache - Texturizado */
        .logo-gouache {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo-gouache:hover {
            transform: scale(1.05);
        }

        /* Canvas para efeito de guache */
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Versão SVG do logotipo */
        .logo-svg {
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        svg {
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        /* Info e controles */
        .info {
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .info h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .info p {
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .color-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .color-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .reset-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            svg {
                width: 280px;
                height: 280px;
            }
            
            .info {
                padding: 15px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Versão SVG com estilo guache -->
        <div class="logo-svg">
            <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Filtro para efeito de textura de guache -->
                    <filter id="gouacheTexture" x="-20%" y="-20%" width="140%" height="140%">
                        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced" />
                        <feGaussianBlur in="displaced" stdDeviation="0.5" result="blurred" />
                        <feComponentTransfer in="blurred">
                            <feFuncA type="linear" slope="1.1" />
                        </feComponentTransfer>
                    </filter>
                    
                    <!-- Gradientes de guache -->
                    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.9" />
                        <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:0.9" />
                        <stop offset="100%" style="stop-color:#FFE66D;stop-opacity:0.9" />
                    </linearGradient>
                    
                    <linearGradient id="appIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:0.95" />
                        <stop offset="100%" style="stop-color:#FF3C38;stop-opacity:0.95" />
                    </linearGradient>
                    
                    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:0.95" />
                        <stop offset="100%" style="stop-color:#556270;stop-opacity:0.95" />
                    </linearGradient>
                    
                    <!-- Pinceladas de guache -->
                    <filter id="brushStroke">
                        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="turbulence" />
                        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="4" />
                        <feGaussianBlur stdDeviation="0.3" />
                    </filter>
                </defs>
                
                <!-- Fundo com textura de papel guache -->
                <rect x="40" y="40" width="420" height="420" rx="30" ry="30" fill="url(#bgGradient)" filter="url(#gouacheTexture)" />
                
                <!-- Manchas de tinta guache (efeito aquarelado) -->
                <circle cx="100" cy="100" r="40" fill="#FF6B6B" opacity="0.3" filter="url(#brushStroke)" />
                <circle cx="400" cy="380" r="50" fill="#4ECDC4" opacity="0.3" filter="url(#brushStroke)" />
                <circle cx="420" cy="80" r="35" fill="#FFE66D" opacity="0.25" filter="url(#brushStroke)" />
                <ellipse cx="80" cy="400" rx="45" ry="30" fill="#FF8C42" opacity="0.2" filter="url(#brushStroke)" />
                
                <!-- Ícone de aplicativo principal -->
                <rect x="150" y="120" width="200" height="200" rx="45" ry="45" fill="url(#appIconGrad)" filter="url(#gouacheTexture)" />
                
                <!-- Moldura do app -->
                <rect x="170" y="140" width="160" height="160" rx="30" ry="30" fill="none" stroke="white" stroke-width="4" opacity="0.8" />
                
                <!-- Elementos de código (</>) -->
                <text x="250" y="225" text-anchor="middle" font-size="70" font-weight="bold" fill="white" font-family="'Courier New', monospace" filter="url(#gouacheTexture)">&lt;/&gt;</text>
                
                <!-- Linhas de código decorativas -->
                <line x1="195" y1="180" x2="225" y2="180" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />
                <line x1="275" y1="180" x2="305" y2="180" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />
                <line x1="195" y1="260" x2="225" y2="260" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />
                <line x1="275" y1="260" x2="305" y2="260" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />
                
                <!-- Traços de pincel no ícone -->
                <path d="M 150 150 Q 180 130 200 160" stroke="white" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round" />
                <path d="M 330 300 Q 320 330 350 340" stroke="white" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round" />
                
                <!-- Texto DEV -->
                <text x="250" y="370" text-anchor="middle" font-size="45" font-weight="800" fill="#2C3E50" font-family="'Segoe UI', 'Poppins', Arial" filter="url(#gouacheTexture)" letter-spacing="3">
                    DEV
                </text>
                
                <!-- Texto APPS -->
                <text x="250" y="415" text-anchor="middle" font-size="32" font-weight="600" fill="#556270" font-family="'Segoe UI', 'Poppins', Arial" filter="url(#gouacheTexture)" letter-spacing="5" opacity="0.9">
                    APPS
                </text>
                
                <!-- Pinceladas decorativas finais -->
                <path d="M 60 200 Q 80 220 60 240" stroke="#FF6B6B" stroke-width="6" fill="none" opacity="0.5" stroke-linecap="round" />
                <path d="M 440 280 Q 420 260 440 240" stroke="#4ECDC4" stroke-width="6" fill="none" opacity="0.5" stroke-linecap="round" />
            </svg>
        </div>
        
        <div class="info">
            <h2>🎨 Logotipo estilo Guache</h2>
            <p>Cores vibrantes com textura artesanal de aquarela</p>
            <div class="color-buttons">
                <div class="color-btn" style="background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D);" onclick="changeColorScheme('default')"></div>
                <div class="color-btn" style="background: linear-gradient(135deg, #FFB347, #FF6B6B, #5F9EA0);" onclick="changeColorScheme('warm')"></div>
                <div class="color-btn" style="background: linear-gradient(135deg, #6C5CE7, #A8E6CF, #FFD93D);" onclick="changeColorScheme('cool')"></div>
                <div class="color-btn" style="background: linear-gradient(135deg, #FF9A9E, #FECFEF, #A1C4FD);" onclick="changeColorScheme('pastel')"></div>
                <div class="color-btn" style="background: linear-gradient(135deg, #F12711, #F5AF19, #B224EF);" onclick="changeColorScheme('vibrant')"></div>
            </div>
            <button class="reset-btn" onclick="resetLogo()">↺ Restaurar Original</button>
        </div>
    </div>

    <!-- Canvas para efeito de guache dinâmico (opcional) -->
    <canvas id="gouacheCanvas" style="display: none;"></canvas>

    <script>
        // Esquemas de cores para o logotipo
        const colorSchemes = {
            default: {
                bgGrad: ['#FF6B6B', '#4ECDC4', '#FFE66D'],
                appGrad: ['#FF8C42', '#FF3C38'],
                codeGrad: ['#4ECDC4', '#556270'],
                textColor1: '#2C3E50',
                textColor2: '#556270'
            },
            warm: {
                bgGrad: ['#FFB347', '#FF6B6B', '#5F9EA0'],
                appGrad: ['#FF6347', '#FF4500'],
                codeGrad: ['#20B2AA', '#FF8C00'],
                textColor1: '#8B4513',
                textColor2: '#A0522D'
            },
            cool: {
                bgGrad: ['#6C5CE7', '#A8E6CF', '#FFD93D'],
                appGrad: ['#4ECDC4', '#48C9B0'],
                codeGrad: ['#5D9CEC', '#4A90E2'],
                textColor1: '#2C3E50',
                textColor2: '#34495E'
            },
            pastel: {
                bgGrad: ['#FF9A9E', '#FECFEF', '#A1C4FD'],
                appGrad: ['#FFB6C1', '#FFC0CB'],
                codeGrad: ['#B0E0E6', '#ADD8E6'],
                textColor1: '#6B5B95',
                textColor2: '#88B04B'
            },
            vibrant: {
                bgGrad: ['#F12711', '#F5AF19', '#B224EF'],
                appGrad: ['#FF512F', '#DD2476'],
                codeGrad: ['#00B4DB', '#0083B0'],
                textColor1: '#FFD700',
                textColor2: '#FFA500'
            }
        };

        // Função para atualizar o logotipo SVG com novas cores
        function updateLogoColors(scheme) {
            const svg = document.querySelector('svg');
            const defs = svg.querySelector('defs');
            
            // Atualizar gradientes
            const bgGrad = defs.querySelector('#bgGradient');
            while (bgGrad.firstChild) {
                bgGrad.removeChild(bgGrad.firstChild);
            }
            
            const stops = ['0%', '50%', '100%'];
            scheme.bgGrad.forEach((color, index) => {
                const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop.setAttribute('offset', stops[index]);
                stop.setAttribute('style', `stop-color:${color};stop-opacity:0.9`);
                bgGrad.appendChild(stop);
            });
            
            // Atualizar gradiente do ícone do app
            const appGrad = defs.querySelector('#appIconGrad');
            while (appGrad.firstChild) {
                appGrad.removeChild(appGrad.firstChild);
            }
            
            const appStop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            appStop1.setAttribute('offset', '0%');
            appStop1.setAttribute('style', `stop-color:${scheme.appGrad[0]};stop-opacity:0.95`);
            const appStop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            appStop2.setAttribute('offset', '100%');
            appStop2.setAttribute('style', `stop-color:${scheme.appGrad[1]};stop-opacity:0.95`);
            appGrad.appendChild(appStop1);
            appGrad.appendChild(appStop2);
            
            // Atualizar gradiente do código
            const codeGrad = defs.querySelector('#codeGrad');
            while (codeGrad.firstChild) {
                codeGrad.removeChild(codeGrad.firstChild);
            }
            
            const codeStop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            codeStop1.setAttribute('offset', '0%');
            codeStop1.setAttribute('style', `stop-color:${scheme.codeGrad[0]};stop-opacity:0.95`);
            const codeStop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            codeStop2.setAttribute('offset', '100%');
            codeStop2.setAttribute('style', `stop-color:${scheme.codeGrad[1]};stop-opacity:0.95`);
            codeGrad.appendChild(codeStop1);
            codeGrad.appendChild(codeStop2);
            
            // Atualizar textos
            const texts = svg.querySelectorAll('text');
            if (texts[1]) texts[1].setAttribute('fill', scheme.textColor1);
            if (texts[2]) texts[2].setAttribute('fill', scheme.textColor2);
            
            // Adicionar efeito de transição
            svg.style.transition = 'all 0.5s ease';
        }
        
        function changeColorScheme(schemeName) {
            const scheme = colorSchemes[schemeName];
            if (scheme) {
                updateLogoColors(scheme);
                // Feedback visual
                const btn = event.target;
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    btn.style.transform = 'scale(1)';
                }, 200);
            }
        }
        
        function resetLogo() {
            updateLogoColors(colorSchemes.default);
            // Feedback
            const resetBtn = document.querySelector('.reset-btn');
            resetBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                resetBtn.style.transform = 'scale(1)';
            }, 200);
        }
        
        // Criar efeito de textura adicional com canvas (opcional)
        function addTexture() {
            const canvas = document.getElementById('gouacheCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 500;
            canvas.height = 500;
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Criar textura de guache
            for(let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.1})`;
                ctx.fillRect(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() * 3,
                    Math.random() * 3
                );
            }
            
            // Adicionar manchas coloridas
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF8C42'];
            colors.forEach(color => {
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.1;
                for(let i = 0; i < 50; i++) {
                    ctx.beginPath();
                    ctx.ellipse(
                        Math.random() * canvas.width,
                        Math.random() * canvas.height,
                        Math.random() * 30 + 10,
                        Math.random() * 30 + 10,
                        0,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            });
            
            // Aplicar textura como background
            const logoDiv = document.querySelector('.logo-svg');
            const textureDataUrl = canvas.toDataURL();
            logoDiv.style.backgroundImage = `url(${textureDataUrl})`;
            logoDiv.style.backgroundSize = 'cover';
            logoDiv.style.backgroundBlendMode = 'multiply';
        }
        
        // Animação de entrada
        document.querySelector('.logo-svg').style.animation = 'fadeInScale 0.6s ease';
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInScale {
                from {
                    opacity: 0;
                    transform: scale(0.8);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            
            .color-btn {
                position: relative;
                overflow: hidden;
            }
            
            .color-btn::before {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                width: 0;
                height: 0;
                border-radius: 50%;
                background: rgba(255,255,255,0.5);
                transform: translate(-50%, -50%);
                transition: width 0.3s, height 0.3s;
            }
            
            .color-btn:active::before {
                width: 100%;
                height: 100%;
            }
        `;
        document.head.appendChild(style);
        
        // Adicionar tooltips
        const colorBtns = document.querySelectorAll('.color-btn');
        const tooltips = ['Esquema Padrão', 'Cores Quentes', 'Cores Frias', 'Pastel', 'Vibrante'];
        colorBtns.forEach((btn, index) => {
            btn.title = tooltips[index];
        });
        
        // Efeito de brilho no logotipo
        const logo = document.querySelector('.logo-svg');
        logo.addEventListener('mousemove', (e) => {
            const rect = logo.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            logo.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%)`;
        });
        
        logo.addEventListener('mouseleave', () => {
            logo.style.background = '';
        });
    </script>
</body>
</html>
